spring.application.name=backendServer

# ====================== CONFIGURACIÓN BASE DE DATOS SQL SERVER ======================
spring.datasource.url=jdbc:sqlserver://100.51.168.103:1433;databaseName=VentasDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=TuPasswordMuySeguro123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ====================== JPA / HIBERNATE ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ====================== PUERTO Y CORS (importante para Angular después) ======================
server.port=8080

# Permitir que Angular pueda llamar a este backend
spring.mvc.cors.allowed-origins=http://100.51.168.103:4200,http://localhost:4200
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true

# Opcional: logs más claros
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ====================== SWAGGER / SPRINGDOC ======================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.use-root-path=false
